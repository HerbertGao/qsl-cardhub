name: Release

on:
  # Tag 推送时触发（格式：v*）
  push:
    tags:
      - 'v*'

  # 手动触发
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  quality-checks:
    name: Quality Checks
    uses: ./.github/workflows/reusable-quality-checks.yml

  create-release:
    name: 创建 Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 获取版本号
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(grep '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: 创建 Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: qsl-cardhub v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true

  build-and-upload:
    name: 构建并上传 ${{ matrix.platform }}
    needs: [quality-checks, create-release]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (ARM64)
          - platform: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            bundle_path: target/aarch64-apple-darwin/release/bundle

          # macOS Intel (x86_64)
          - platform: macos-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            bundle_path: target/x86_64-apple-darwin/release/bundle

          # Windows x64
          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_path: target/x86_64-pc-windows-msvc/release/bundle

          # Windows ARM64
          - platform: windows-arm64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundle_path: target/aarch64-pc-windows-msvc/release/bundle

    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      ALIYUN_OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
      ALIYUN_OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
      ALIYUN_OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
      ALIYUN_OSS_BUCKET_NAME: ${{ secrets.ALIYUN_OSS_BUCKET_NAME }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Rust 缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: 安装前端依赖
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: 生成顺丰速运默认配置
        shell: bash
        run: |
          cat > config/sf_express_default.toml << TOML
          enabled = true
          partner_id = "${{ secrets.SF_PARTNER_ID }}"
          checkword_sandbox = "${{ secrets.SF_CHECKWORD_SANDBOX }}"
          checkword_prod = "${{ secrets.SF_CHECKWORD_PROD }}"
          TOML

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked --force

      - name: 构建 Tauri 应用
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 10
          command: cargo tauri build --target ${{ matrix.target }}

      - name: 准备产物 (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          mkdir -p dist

          # DMG 文件（用于手动下载，必需）
          DMG_PATH=$(find ${{ matrix.bundle_path }}/dmg -name "*.dmg" | head -n 1)
          if [ -z "$DMG_PATH" ] || [ ! -f "$DMG_PATH" ]; then
            echo "错误：未找到 DMG 文件"
            exit 1
          fi
          cp "$DMG_PATH" "dist/qsl-cardhub-v${VERSION}-${{ matrix.platform }}.dmg"

          # .app.tar.gz 文件（用于更新器，必需）
          APP_TAR_PATH=$(find ${{ matrix.bundle_path }}/macos -name "*.app.tar.gz" | head -n 1)
          if [ -z "$APP_TAR_PATH" ] || [ ! -f "$APP_TAR_PATH" ]; then
            echo "错误：未找到 .app.tar.gz 文件"
            exit 1
          fi
          cp "$APP_TAR_PATH" "dist/qsl-cardhub-v${VERSION}-${{ matrix.platform }}.app.tar.gz"

          # .app.tar.gz 签名文件（用于更新器，必需）
          APP_TAR_SIG=$(find ${{ matrix.bundle_path }}/macos -name "*.app.tar.gz.sig" | head -n 1)
          if [ -z "$APP_TAR_SIG" ] || [ ! -f "$APP_TAR_SIG" ]; then
            echo "错误：未找到 .app.tar.gz.sig 签名文件"
            exit 1
          fi
          cp "$APP_TAR_SIG" "dist/qsl-cardhub-v${VERSION}-${{ matrix.platform }}.app.tar.gz.sig"

          ls -la dist/

      - name: 准备产物 (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          mkdir -p dist

          # MSI 文件（可选）
          MSI_PATH=$(find ${{ matrix.bundle_path }}/msi -name "*.msi" | head -n 1)
          if [ -f "$MSI_PATH" ]; then
            cp "$MSI_PATH" "dist/qsl-cardhub-v${VERSION}-${{ matrix.platform }}.msi"
          fi

          # NSIS 安装包（必需）
          NSIS_PATH=$(find ${{ matrix.bundle_path }}/nsis -name "*.exe" | head -n 1)
          if [ -z "$NSIS_PATH" ] || [ ! -f "$NSIS_PATH" ]; then
            echo "错误：未找到 NSIS 安装包"
            exit 1
          fi
          cp "$NSIS_PATH" "dist/qsl-cardhub-v${VERSION}-${{ matrix.platform }}-setup.exe"

          # NSIS 签名文件（必需）
          NSIS_SIG=$(find ${{ matrix.bundle_path }}/nsis -name "*.exe.sig" | head -n 1)
          if [ -z "$NSIS_SIG" ] || [ ! -f "$NSIS_SIG" ]; then
            echo "错误：未找到 NSIS 签名文件"
            exit 1
          fi
          cp "$NSIS_SIG" "dist/qsl-cardhub-v${VERSION}-${{ matrix.platform }}-setup.exe.sig"

          ls -la dist/

      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: dist/*

      - name: 上传工作流产物（供更新清单生成）
        uses: actions/upload-artifact@v4
        with:
          name: release-dist-${{ matrix.platform }}
          path: dist/*
          retention-days: 3

      # 阿里云 OSS 上传（可选，需要配置 Secrets）
      - name: 安装 ossutil
        if: ${{ env.ALIYUN_OSS_ACCESS_KEY_ID != '' && env.ALIYUN_OSS_ACCESS_KEY_SECRET != '' && env.ALIYUN_OSS_ENDPOINT != '' && env.ALIYUN_OSS_BUCKET_NAME != '' }}
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            # 根据架构选择正确的 ossutil 版本
            if [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
              wget https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil-v1.7.18-mac-arm64.zip
              unzip ossutil-v1.7.18-mac-arm64.zip
              sudo mv ossutil-v1.7.18-mac-arm64/ossutil /usr/local/bin/
            else
              wget https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil-v1.7.18-mac-amd64.zip
              unzip ossutil-v1.7.18-mac-amd64.zip
              sudo mv ossutil-v1.7.18-mac-amd64/ossutil /usr/local/bin/
            fi
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            curl -o ossutil.zip https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil-v1.7.18-windows-amd64.zip
            unzip ossutil.zip
            mv ossutil-v1.7.18-windows-amd64/ossutil.exe /c/Windows/System32/
          fi
          ossutil --version

      - name: 配置 ossutil
        if: ${{ env.ALIYUN_OSS_ACCESS_KEY_ID != '' && env.ALIYUN_OSS_ACCESS_KEY_SECRET != '' && env.ALIYUN_OSS_ENDPOINT != '' && env.ALIYUN_OSS_BUCKET_NAME != '' }}
        shell: bash
        env:
          OSS_ACCESS_KEY_ID: ${{ env.ALIYUN_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ env.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ env.ALIYUN_OSS_ENDPOINT }}
        run: |
          ossutil config -e "${OSS_ENDPOINT}" -i "${OSS_ACCESS_KEY_ID}" -k "${OSS_ACCESS_KEY_SECRET}"

      - name: 上传到阿里云 OSS
        if: ${{ env.ALIYUN_OSS_ACCESS_KEY_ID != '' && env.ALIYUN_OSS_ACCESS_KEY_SECRET != '' && env.ALIYUN_OSS_ENDPOINT != '' && env.ALIYUN_OSS_BUCKET_NAME != '' }}
        shell: bash
        env:
          OSS_BUCKET: ${{ env.ALIYUN_OSS_BUCKET_NAME }}
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          
          # 上传所有文件到 OSS
          for file in dist/*; do
            filename=$(basename "$file")
            # 上传到 /releases/v{version}/ 目录
            ossutil cp "$file" "oss://${OSS_BUCKET}/releases/v${VERSION}/${filename}" --force
            echo "已上传: ${filename}"
          done
          
          # 验证上传
          ossutil ls "oss://${OSS_BUCKET}/releases/v${VERSION}/"

  generate-update-manifest:
    name: 生成更新清单
    needs: [create-release, build-and-upload]
    runs-on: ubuntu-latest
    env:
      ALIYUN_OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
      ALIYUN_OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
      ALIYUN_OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
      ALIYUN_OSS_BUCKET_NAME: ${{ secrets.ALIYUN_OSS_BUCKET_NAME }}
      ALIYUN_CDN_DOMAIN: ${{ secrets.ALIYUN_CDN_DOMAIN }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          pattern: release-dist-*
          path: dist
          merge-multiple: true

      - name: 下载 Release 资产信息
        id: release_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          REPO=${{ github.repository }}

          # 认证请求：未认证 curl 受 60/小时 限流，限流/瞬时错误会让 .published_at/.body 返回 null，
          # 进而把 latest.json 的 pub_date 写成字面量 "null" → tauri-plugin-updater 解析失败、无法内更新（v0.8.0 即此问题）。
          RELEASE_JSON=$(curl -s \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/releases/tags/v${VERSION}")
          RELEASE_BODY=$(echo "$RELEASE_JSON" | jq -r '.body // "No release notes"')
          RELEASE_DATE=$(echo "$RELEASE_JSON" | jq -r '.published_at // empty')

          # pub_date 兜底：缺失/空/"null" → 回落当前 UTC（RFC3339），绝不输出字面量 "null"。
          if [ -z "$RELEASE_DATE" ] || [ "$RELEASE_DATE" = "null" ]; then
            RELEASE_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            echo "::warning::release published_at 缺失，回落到当前 UTC 时间 ${RELEASE_DATE}"
          fi

          echo "release_body<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "release_date=$RELEASE_DATE" >> $GITHUB_OUTPUT

      - name: 生成 latest.json
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          REPO=${{ github.repository }}
          RELEASE_DATE="${{ steps.release_info.outputs.release_date }}"
          NOTES=$(cat << 'NOTES_EOF'
          ${{ steps.release_info.outputs.release_body }}
          NOTES_EOF
          )

          MACOS_ARM64_SIG=$(cat "dist/qsl-cardhub-v${VERSION}-macos-arm64.app.tar.gz.sig")
          MACOS_X64_SIG=$(cat "dist/qsl-cardhub-v${VERSION}-macos-x64.app.tar.gz.sig")
          WINDOWS_X64_SIG=$(cat "dist/qsl-cardhub-v${VERSION}-windows-x64-setup.exe.sig")
          WINDOWS_ARM64_SIG=$(cat "dist/qsl-cardhub-v${VERSION}-windows-arm64-setup.exe.sig")

          # 生成 latest.json
          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": $(echo "$NOTES" | jq -Rs .),
            "pub_date": "${RELEASE_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MACOS_ARM64_SIG}",
                "url": "https://github.com/${REPO}/releases/download/v${VERSION}/qsl-cardhub-v${VERSION}-macos-arm64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${MACOS_X64_SIG}",
                "url": "https://github.com/${REPO}/releases/download/v${VERSION}/qsl-cardhub-v${VERSION}-macos-x64.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WINDOWS_X64_SIG}",
                "url": "https://github.com/${REPO}/releases/download/v${VERSION}/qsl-cardhub-v${VERSION}-windows-x64-setup.exe"
              },
              "windows-aarch64": {
                "signature": "${WINDOWS_ARM64_SIG}",
                "url": "https://github.com/${REPO}/releases/download/v${VERSION}/qsl-cardhub-v${VERSION}-windows-arm64-setup.exe"
              }
            }
          }
          EOF

          cat latest.json

          # 校验 pub_date 为合法 RFC3339：拒绝发布会让 tauri-plugin-updater 解析失败、无法内更新的清单
          PD=$(jq -r '.pub_date' latest.json)
          if ! printf '%s' "$PD" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}'; then
            echo "::error::latest.json pub_date 非法，拒绝发布: ${PD}"
            exit 1
          fi

      - name: 上传 latest.json 到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: latest.json

      # 生成阿里云 CDN 版本的 latest.json（可选）
      - name: 生成 latest.json (CDN 版本)
        if: ${{ env.ALIYUN_OSS_ACCESS_KEY_ID != '' && env.ALIYUN_OSS_ACCESS_KEY_SECRET != '' && env.ALIYUN_OSS_ENDPOINT != '' && env.ALIYUN_OSS_BUCKET_NAME != '' && env.ALIYUN_CDN_DOMAIN != '' }}
        env:
          CDN_DOMAIN: ${{ env.ALIYUN_CDN_DOMAIN }}
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          RELEASE_DATE="${{ steps.release_info.outputs.release_date }}"
          NOTES=$(cat << 'NOTES_EOF'
          ${{ steps.release_info.outputs.release_body }}
          NOTES_EOF
          )

          MACOS_ARM64_SIG=$(cat "dist/qsl-cardhub-v${VERSION}-macos-arm64.app.tar.gz.sig")
          MACOS_X64_SIG=$(cat "dist/qsl-cardhub-v${VERSION}-macos-x64.app.tar.gz.sig")
          WINDOWS_X64_SIG=$(cat "dist/qsl-cardhub-v${VERSION}-windows-x64-setup.exe.sig")
          WINDOWS_ARM64_SIG=$(cat "dist/qsl-cardhub-v${VERSION}-windows-arm64-setup.exe.sig")

          # 生成 latest-cdn.json (使用 CDN URLs)
          cat > latest-cdn.json << EOF
          {
            "version": "${VERSION}",
            "notes": $(echo "$NOTES" | jq -Rs .),
            "pub_date": "${RELEASE_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MACOS_ARM64_SIG}",
                "url": "https://${CDN_DOMAIN}/releases/v${VERSION}/qsl-cardhub-v${VERSION}-macos-arm64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${MACOS_X64_SIG}",
                "url": "https://${CDN_DOMAIN}/releases/v${VERSION}/qsl-cardhub-v${VERSION}-macos-x64.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WINDOWS_X64_SIG}",
                "url": "https://${CDN_DOMAIN}/releases/v${VERSION}/qsl-cardhub-v${VERSION}-windows-x64-setup.exe"
              },
              "windows-aarch64": {
                "signature": "${WINDOWS_ARM64_SIG}",
                "url": "https://${CDN_DOMAIN}/releases/v${VERSION}/qsl-cardhub-v${VERSION}-windows-arm64-setup.exe"
              }
            }
          }
          EOF

          echo "生成的 latest-cdn.json:"
          cat latest-cdn.json

      - name: 安装 ossutil
        if: ${{ env.ALIYUN_OSS_ACCESS_KEY_ID != '' && env.ALIYUN_OSS_ACCESS_KEY_SECRET != '' && env.ALIYUN_OSS_ENDPOINT != '' && env.ALIYUN_OSS_BUCKET_NAME != '' && env.ALIYUN_CDN_DOMAIN != '' }}
        run: |
          wget https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil-v1.7.18-linux-amd64.zip
          unzip ossutil-v1.7.18-linux-amd64.zip
          sudo mv ossutil-v1.7.18-linux-amd64/ossutil /usr/local/bin/
          ossutil --version

      - name: 配置 ossutil
        if: ${{ env.ALIYUN_OSS_ACCESS_KEY_ID != '' && env.ALIYUN_OSS_ACCESS_KEY_SECRET != '' && env.ALIYUN_OSS_ENDPOINT != '' && env.ALIYUN_OSS_BUCKET_NAME != '' && env.ALIYUN_CDN_DOMAIN != '' }}
        env:
          OSS_ACCESS_KEY_ID: ${{ env.ALIYUN_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ env.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ env.ALIYUN_OSS_ENDPOINT }}
        run: |
          ossutil config -e "${OSS_ENDPOINT}" -i "${OSS_ACCESS_KEY_ID}" -k "${OSS_ACCESS_KEY_SECRET}"

      - name: 上传 latest.json 到阿里云 OSS
        if: ${{ env.ALIYUN_OSS_ACCESS_KEY_ID != '' && env.ALIYUN_OSS_ACCESS_KEY_SECRET != '' && env.ALIYUN_OSS_ENDPOINT != '' && env.ALIYUN_OSS_BUCKET_NAME != '' && env.ALIYUN_CDN_DOMAIN != '' }}
        env:
          OSS_BUCKET: ${{ env.ALIYUN_OSS_BUCKET_NAME }}
        run: |
          # 上传 CDN 版本的 latest.json 到 OSS 根目录，命名为 latest.json
          ossutil cp latest-cdn.json "oss://${OSS_BUCKET}/latest.json" --force
          
          # 验证上传
          echo "已上传 latest.json 到 OSS:"
          ossutil ls "oss://${OSS_BUCKET}/latest.json"
          
          echo ""
          echo "✅ CDN 更新清单已上传"
          echo "CDN URL: https://${ALIYUN_CDN_DOMAIN}/latest.json"

  release-summary:
    name: 发布总结
    needs: [create-release, build-and-upload, generate-update-manifest]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 更新 Release 说明
        if: needs.build-and-upload.result == 'success' && needs.generate-update-manifest.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          REPO=${{ github.repository }}
          BASE_URL="https://github.com/${REPO}/releases/download/v${VERSION}"

          # 生成下载表格
          DOWNLOAD_TABLE=$(cat << 'EOF'
          ## 下载

          | 架构 | Windows | macOS |
          |------|---------|-------|
          | x86_64 (Intel) | [EXE](BASE_URL/qsl-cardhub-vVERSION-windows-x64-setup.exe) &nbsp; [MSI](BASE_URL/qsl-cardhub-vVERSION-windows-x64.msi) | [DMG](BASE_URL/qsl-cardhub-vVERSION-macos-x64.dmg) |
          | ARM64 | [EXE](BASE_URL/qsl-cardhub-vVERSION-windows-arm64-setup.exe) &nbsp; [MSI](BASE_URL/qsl-cardhub-vVERSION-windows-arm64.msi) | [DMG](BASE_URL/qsl-cardhub-vVERSION-macos-arm64.dmg) |

          EOF
          )

          # 替换占位符
          DOWNLOAD_TABLE="${DOWNLOAD_TABLE//BASE_URL/$BASE_URL}"
          DOWNLOAD_TABLE="${DOWNLOAD_TABLE//VERSION/$VERSION}"

          # 获取当前 Release body（自动生成的 changelog）
          CURRENT_BODY=$(gh release view "v${VERSION}" --json body -q '.body')

          # 组合新的 Release body
          NEW_BODY="${DOWNLOAD_TABLE}

          ## 更新日志

          ${CURRENT_BODY}"

          # 更新 Release
          gh release edit "v${VERSION}" --notes "$NEW_BODY"

      - name: 检查发布状态
        run: |
          echo "📦 Release: v${{ needs.create-release.outputs.version }}"
          if [ "${{ needs.build-and-upload.result }}" == "success" ] && [ "${{ needs.generate-update-manifest.result }}" == "success" ]; then
            echo "✅ 所有平台构建并上传成功"
            echo ""
            echo "下载地址："
            echo "https://github.com/${{ github.repository }}/releases/tag/v${{ needs.create-release.outputs.version }}"
            echo ""
            echo "更新清单："
            echo "https://github.com/${{ github.repository }}/releases/latest/download/latest.json"
            exit 0
          else
            echo "❌ 部分平台构建失败"
            exit 1
          fi
