name: Release

on:
  # Tag 推送时触发（格式：v*）
  push:
    tags:
      - 'v*'

  # 手动触发
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # 前端代码检查
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: 安装依赖
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: TypeScript 类型检查
        working-directory: web
        run: pnpm run type-check

      - name: ESLint 检查
        working-directory: web
        run: pnpm run lint

  create-release:
    name: 创建 Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 获取版本号
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(grep '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: 创建 Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: qsl-cardhub v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true

  build-and-upload:
    name: 构建并上传 ${{ matrix.platform }}
    needs: [lint, create-release]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (ARM64)
          - platform: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            bundle_path: target/aarch64-apple-darwin/release/bundle

          # macOS Intel (x86_64)
          - platform: macos-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            bundle_path: target/x86_64-apple-darwin/release/bundle

          # Windows x64
          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_path: target/x86_64-pc-windows-msvc/release/bundle

          # Windows ARM64
          - platform: windows-arm64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundle_path: target/aarch64-pc-windows-msvc/release/bundle

    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Rust 缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: 安装前端依赖
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: 构建前端
        working-directory: web
        run: pnpm run build

      - name: 生成顺丰速运默认配置
        shell: bash
        run: |
          cat > config/sf_express_default.toml << TOML
          enabled = true
          partner_id = "${{ secrets.SF_PARTNER_ID }}"
          checkword_sandbox = "${{ secrets.SF_CHECKWORD_SANDBOX }}"
          checkword_prod = "${{ secrets.SF_CHECKWORD_PROD }}"
          TOML

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked --force

      - name: 构建 Tauri 应用
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 10
          command: cargo tauri build --target ${{ matrix.target }}

      - name: 准备产物 (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          mkdir -p dist

          # DMG 文件（用于手动下载，必需）
          DMG_PATH=$(find ${{ matrix.bundle_path }}/dmg -name "*.dmg" | head -n 1)
          if [ -z "$DMG_PATH" ] || [ ! -f "$DMG_PATH" ]; then
            echo "错误：未找到 DMG 文件"
            exit 1
          fi
          cp "$DMG_PATH" "dist/qsl-cardhub-v${VERSION}-${{ matrix.platform }}.dmg"

          # .app.tar.gz 文件（用于更新器，必需）
          APP_TAR_PATH=$(find ${{ matrix.bundle_path }}/macos -name "*.app.tar.gz" | head -n 1)
          if [ -z "$APP_TAR_PATH" ] || [ ! -f "$APP_TAR_PATH" ]; then
            echo "错误：未找到 .app.tar.gz 文件"
            exit 1
          fi
          cp "$APP_TAR_PATH" "dist/qsl-cardhub-v${VERSION}-${{ matrix.platform }}.app.tar.gz"

          # .app.tar.gz 签名文件（用于更新器，必需）
          APP_TAR_SIG=$(find ${{ matrix.bundle_path }}/macos -name "*.app.tar.gz.sig" | head -n 1)
          if [ -z "$APP_TAR_SIG" ] || [ ! -f "$APP_TAR_SIG" ]; then
            echo "错误：未找到 .app.tar.gz.sig 签名文件"
            exit 1
          fi
          cp "$APP_TAR_SIG" "dist/qsl-cardhub-v${VERSION}-${{ matrix.platform }}.app.tar.gz.sig"

          ls -la dist/

      - name: 准备产物 (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          mkdir -p dist

          # MSI 文件（可选）
          MSI_PATH=$(find ${{ matrix.bundle_path }}/msi -name "*.msi" | head -n 1)
          if [ -f "$MSI_PATH" ]; then
            cp "$MSI_PATH" "dist/qsl-cardhub-v${VERSION}-${{ matrix.platform }}.msi"
          fi

          # NSIS 安装包（必需）
          NSIS_PATH=$(find ${{ matrix.bundle_path }}/nsis -name "*.exe" | head -n 1)
          if [ -z "$NSIS_PATH" ] || [ ! -f "$NSIS_PATH" ]; then
            echo "错误：未找到 NSIS 安装包"
            exit 1
          fi
          cp "$NSIS_PATH" "dist/qsl-cardhub-v${VERSION}-${{ matrix.platform }}-setup.exe"

          # NSIS 签名文件（必需）
          NSIS_SIG=$(find ${{ matrix.bundle_path }}/nsis -name "*.exe.sig" | head -n 1)
          if [ -z "$NSIS_SIG" ] || [ ! -f "$NSIS_SIG" ]; then
            echo "错误：未找到 NSIS 签名文件"
            exit 1
          fi
          cp "$NSIS_SIG" "dist/qsl-cardhub-v${VERSION}-${{ matrix.platform }}-setup.exe.sig"

          ls -la dist/

      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: dist/*

      # 阿里云 OSS 上传（可选，需要配置 Secrets）
      - name: 安装 ossutil
        if: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID != '' && secrets.ALIYUN_OSS_ACCESS_KEY_SECRET != '' && secrets.ALIYUN_OSS_ENDPOINT != '' && secrets.ALIYUN_OSS_BUCKET_NAME != '' }}
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            wget https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil-v1.7.18-linux-amd64.zip
            unzip ossutil-v1.7.18-linux-amd64.zip
            sudo mv ossutil-v1.7.18-linux-amd64/ossutil /usr/local/bin/
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            # 根据架构选择正确的 ossutil 版本
            if [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
              wget https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil-v1.7.18-mac-arm64.zip
              unzip ossutil-v1.7.18-mac-arm64.zip
              sudo mv ossutil-v1.7.18-mac-arm64/ossutil /usr/local/bin/
            else
              wget https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil-v1.7.18-mac-amd64.zip
              unzip ossutil-v1.7.18-mac-amd64.zip
              sudo mv ossutil-v1.7.18-mac-amd64/ossutil /usr/local/bin/
            fi
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            curl -o ossutil.zip https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil-v1.7.18-windows-amd64.zip
            unzip ossutil.zip
            mv ossutil-v1.7.18-windows-amd64/ossutil.exe /c/Windows/System32/
          fi
          ossutil --version

      - name: 配置 ossutil
        if: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID != '' && secrets.ALIYUN_OSS_ACCESS_KEY_SECRET != '' && secrets.ALIYUN_OSS_ENDPOINT != '' && secrets.ALIYUN_OSS_BUCKET_NAME != '' }}
        shell: bash
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
        run: |
          ossutil config -e "${OSS_ENDPOINT}" -i "${OSS_ACCESS_KEY_ID}" -k "${OSS_ACCESS_KEY_SECRET}"

      - name: 上传到阿里云 OSS
        if: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID != '' && secrets.ALIYUN_OSS_ACCESS_KEY_SECRET != '' && secrets.ALIYUN_OSS_ENDPOINT != '' && secrets.ALIYUN_OSS_BUCKET_NAME != '' }}
        shell: bash
        env:
          OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET_NAME }}
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          
          # 上传所有文件到 OSS
          for file in dist/*; do
            filename=$(basename "$file")
            # 上传到 /releases/v{version}/ 目录
            ossutil cp "$file" "oss://${OSS_BUCKET}/releases/v${VERSION}/${filename}" --force
            echo "已上传: ${filename}"
          done
          
          # 验证上传
          ossutil ls "oss://${OSS_BUCKET}/releases/v${VERSION}/"

  generate-update-manifest:
    name: 生成更新清单
    needs: [create-release, build-and-upload]
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 Release 资产信息
        id: release_info
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          REPO=${{ github.repository }}

          # 获取 Release 信息
          RELEASE_JSON=$(curl -s "https://api.github.com/repos/${REPO}/releases/tags/v${VERSION}")
          RELEASE_BODY=$(echo "$RELEASE_JSON" | jq -r '.body // "No release notes"')
          RELEASE_DATE=$(echo "$RELEASE_JSON" | jq -r '.published_at')

          echo "release_body<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "release_date=$RELEASE_DATE" >> $GITHUB_OUTPUT

      - name: 获取签名文件
        id: signatures
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          REPO=${{ github.repository }}

          # 获取签名文件内容（带重试机制）
          get_signature() {
            local sig_url="https://github.com/${REPO}/releases/download/v${VERSION}/$1"
            local max_attempts=20
            local attempt=1
            local wait_time=5
            
            while [ $attempt -le $max_attempts ]; do
              echo "尝试获取 $1 (第 ${attempt}/${max_attempts} 次)..." >&2
              local content=$(curl -sL "$sig_url" 2>/dev/null)
              
              # 检查是否成功获取到内容（非空且不是HTML错误页面或JSON错误）
              if [ -n "$content" ] && ! echo "$content" | grep -qi "<!DOCTYPE html>" && ! echo "$content" | grep -qi '"message".*"Not Found"'; then
                echo "成功获取 $1" >&2
                echo "$content"
                return 0
              fi
              
              if [ $attempt -lt $max_attempts ]; then
                echo "资产尚未可用，等待 ${wait_time} 秒后重试..." >&2
                sleep $wait_time
              fi
              
              attempt=$((attempt + 1))
            done
            
            echo "错误：在 $max_attempts 次尝试后仍无法获取 $1" >&2
            return 1
          }

          # 获取所有平台的签名
          MACOS_ARM64_SIG=$(get_signature "qsl-cardhub-v${VERSION}-macos-arm64.app.tar.gz.sig") || exit 1
          MACOS_X64_SIG=$(get_signature "qsl-cardhub-v${VERSION}-macos-x64.app.tar.gz.sig") || exit 1
          WINDOWS_X64_SIG=$(get_signature "qsl-cardhub-v${VERSION}-windows-x64-setup.exe.sig") || exit 1
          WINDOWS_ARM64_SIG=$(get_signature "qsl-cardhub-v${VERSION}-windows-arm64-setup.exe.sig") || exit 1

          # 保存到输出（使用 heredoc 语法支持多行签名）
          echo "macos_arm64<<EOF" >> $GITHUB_OUTPUT
          echo "$MACOS_ARM64_SIG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "macos_x64<<EOF" >> $GITHUB_OUTPUT
          echo "$MACOS_X64_SIG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "windows_x64<<EOF" >> $GITHUB_OUTPUT
          echo "$WINDOWS_X64_SIG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "windows_arm64<<EOF" >> $GITHUB_OUTPUT
          echo "$WINDOWS_ARM64_SIG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 生成 latest.json
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          REPO=${{ github.repository }}
          RELEASE_DATE="${{ steps.release_info.outputs.release_date }}"
          NOTES=$(cat << 'NOTES_EOF'
          ${{ steps.release_info.outputs.release_body }}
          NOTES_EOF
          )

          # 使用已获取的签名
          MACOS_ARM64_SIG="${{ steps.signatures.outputs.macos_arm64 }}"
          MACOS_X64_SIG="${{ steps.signatures.outputs.macos_x64 }}"
          WINDOWS_X64_SIG="${{ steps.signatures.outputs.windows_x64 }}"
          WINDOWS_ARM64_SIG="${{ steps.signatures.outputs.windows_arm64 }}"

          # 生成 latest.json
          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": $(echo "$NOTES" | jq -Rs .),
            "pub_date": "${RELEASE_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MACOS_ARM64_SIG}",
                "url": "https://github.com/${REPO}/releases/download/v${VERSION}/qsl-cardhub-v${VERSION}-macos-arm64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${MACOS_X64_SIG}",
                "url": "https://github.com/${REPO}/releases/download/v${VERSION}/qsl-cardhub-v${VERSION}-macos-x64.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WINDOWS_X64_SIG}",
                "url": "https://github.com/${REPO}/releases/download/v${VERSION}/qsl-cardhub-v${VERSION}-windows-x64-setup.exe"
              },
              "windows-aarch64": {
                "signature": "${WINDOWS_ARM64_SIG}",
                "url": "https://github.com/${REPO}/releases/download/v${VERSION}/qsl-cardhub-v${VERSION}-windows-arm64-setup.exe"
              }
            }
          }
          EOF

          cat latest.json

      - name: 上传 latest.json 到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: latest.json

      # 生成阿里云 CDN 版本的 latest.json（可选）
      - name: 生成 latest.json (CDN 版本)
        if: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID != '' && secrets.ALIYUN_CDN_DOMAIN != '' }}
        env:
          CDN_DOMAIN: ${{ secrets.ALIYUN_CDN_DOMAIN }}
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          RELEASE_DATE="${{ steps.release_info.outputs.release_date }}"
          NOTES=$(cat << 'NOTES_EOF'
          ${{ steps.release_info.outputs.release_body }}
          NOTES_EOF
          )

          # 使用已获取的签名（签名与 GitHub 版本相同）
          MACOS_ARM64_SIG="${{ steps.signatures.outputs.macos_arm64 }}"
          MACOS_X64_SIG="${{ steps.signatures.outputs.macos_x64 }}"
          WINDOWS_X64_SIG="${{ steps.signatures.outputs.windows_x64 }}"
          WINDOWS_ARM64_SIG="${{ steps.signatures.outputs.windows_arm64 }}"

          # 生成 latest-cdn.json (使用 CDN URLs)
          cat > latest-cdn.json << EOF
          {
            "version": "${VERSION}",
            "notes": $(echo "$NOTES" | jq -Rs .),
            "pub_date": "${RELEASE_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MACOS_ARM64_SIG}",
                "url": "https://${CDN_DOMAIN}/releases/v${VERSION}/qsl-cardhub-v${VERSION}-macos-arm64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${MACOS_X64_SIG}",
                "url": "https://${CDN_DOMAIN}/releases/v${VERSION}/qsl-cardhub-v${VERSION}-macos-x64.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WINDOWS_X64_SIG}",
                "url": "https://${CDN_DOMAIN}/releases/v${VERSION}/qsl-cardhub-v${VERSION}-windows-x64-setup.exe"
              },
              "windows-aarch64": {
                "signature": "${WINDOWS_ARM64_SIG}",
                "url": "https://${CDN_DOMAIN}/releases/v${VERSION}/qsl-cardhub-v${VERSION}-windows-arm64-setup.exe"
              }
            }
          }
          EOF

          echo "生成的 latest-cdn.json:"
          cat latest-cdn.json

      - name: 安装 ossutil
        if: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID != '' && secrets.ALIYUN_OSS_ACCESS_KEY_SECRET != '' && secrets.ALIYUN_OSS_ENDPOINT != '' && secrets.ALIYUN_OSS_BUCKET_NAME != '' && secrets.ALIYUN_CDN_DOMAIN != '' }}
        run: |
          wget https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil-v1.7.18-linux-amd64.zip
          unzip ossutil-v1.7.18-linux-amd64.zip
          sudo mv ossutil-v1.7.18-linux-amd64/ossutil /usr/local/bin/
          ossutil --version

      - name: 配置 ossutil
        if: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID != '' && secrets.ALIYUN_OSS_ACCESS_KEY_SECRET != '' && secrets.ALIYUN_OSS_ENDPOINT != '' && secrets.ALIYUN_OSS_BUCKET_NAME != '' && secrets.ALIYUN_CDN_DOMAIN != '' }}
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
        run: |
          ossutil config -e "${OSS_ENDPOINT}" -i "${OSS_ACCESS_KEY_ID}" -k "${OSS_ACCESS_KEY_SECRET}"

      - name: 上传 latest.json 到阿里云 OSS
        if: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID != '' && secrets.ALIYUN_OSS_ACCESS_KEY_SECRET != '' && secrets.ALIYUN_OSS_ENDPOINT != '' && secrets.ALIYUN_OSS_BUCKET_NAME != '' && secrets.ALIYUN_CDN_DOMAIN != '' }}
        env:
          OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET_NAME }}
        run: |
          # 上传 CDN 版本的 latest.json 到 OSS 根目录，命名为 latest.json
          ossutil cp latest-cdn.json "oss://${OSS_BUCKET}/latest.json" --force
          
          # 验证上传
          echo "已上传 latest.json 到 OSS:"
          ossutil ls "oss://${OSS_BUCKET}/latest.json"
          
          echo ""
          echo "✅ CDN 更新清单已上传"
          echo "CDN URL: https://${{ secrets.ALIYUN_CDN_DOMAIN }}/latest.json"

  release-summary:
    name: 发布总结
    needs: [create-release, build-and-upload, generate-update-manifest]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 更新 Release 说明
        if: needs.build-and-upload.result == 'success' && needs.generate-update-manifest.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          REPO=${{ github.repository }}
          BASE_URL="https://github.com/${REPO}/releases/download/v${VERSION}"

          # 生成下载表格
          DOWNLOAD_TABLE=$(cat << 'EOF'
          ## 下载

          | 架构 | Windows | macOS |
          |------|---------|-------|
          | x86_64 (Intel) | [EXE](BASE_URL/qsl-cardhub-vVERSION-windows-x64-setup.exe) &nbsp; [MSI](BASE_URL/qsl-cardhub-vVERSION-windows-x64.msi) | [DMG](BASE_URL/qsl-cardhub-vVERSION-macos-x64.dmg) |
          | ARM64 | [EXE](BASE_URL/qsl-cardhub-vVERSION-windows-arm64-setup.exe) &nbsp; [MSI](BASE_URL/qsl-cardhub-vVERSION-windows-arm64.msi) | [DMG](BASE_URL/qsl-cardhub-vVERSION-macos-arm64.dmg) |

          EOF
          )

          # 替换占位符
          DOWNLOAD_TABLE="${DOWNLOAD_TABLE//BASE_URL/$BASE_URL}"
          DOWNLOAD_TABLE="${DOWNLOAD_TABLE//VERSION/$VERSION}"

          # 获取当前 Release body（自动生成的 changelog）
          CURRENT_BODY=$(gh release view "v${VERSION}" --json body -q '.body')

          # 组合新的 Release body
          NEW_BODY="${DOWNLOAD_TABLE}

          ## 更新日志

          ${CURRENT_BODY}"

          # 更新 Release
          gh release edit "v${VERSION}" --notes "$NEW_BODY"

      - name: 检查发布状态
        run: |
          echo "📦 Release: v${{ needs.create-release.outputs.version }}"
          if [ "${{ needs.build-and-upload.result }}" == "success" ] && [ "${{ needs.generate-update-manifest.result }}" == "success" ]; then
            echo "✅ 所有平台构建并上传成功"
            echo ""
            echo "下载地址："
            echo "https://github.com/${{ github.repository }}/releases/tag/v${{ needs.create-release.outputs.version }}"
            echo ""
            echo "更新清单："
            echo "https://github.com/${{ github.repository }}/releases/latest/download/latest.json"
            exit 0
          else
            echo "❌ 部分平台构建失败"
            exit 1
          fi
